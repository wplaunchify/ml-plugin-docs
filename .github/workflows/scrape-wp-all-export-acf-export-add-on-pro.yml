name: Scrape Wp All Export Acf Export Add On Pro Documentation

on:
  schedule:
    - cron: '0 12 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Wp All Export Acf Export Add On Pro scraper
        run: node scraper.js --slug=wp-all-export-acf-export-add-on-pro --mode=wp-api --url=https://www.wpallimport.com --post-type=documentation --name="WP All Export - ACF Export Add-On Pro"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: wp-all-export-acf-export-add-on-pro
          SCRAPE_NAME: "Wp All Export Acf Export Add On Pro"
        run: bash scripts/gh-push-scrape.sh
