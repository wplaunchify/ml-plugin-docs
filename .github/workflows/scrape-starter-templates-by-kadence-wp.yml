name: Scrape Starter Templates By Kadence Wp Documentation

on:
  schedule:
    - cron: '0 16 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Starter Templates By Kadence Wp scraper
        run: node scraper.js --slug=starter-templates-by-kadence-wp --mode=wp-api --url=https://www.kadencewp.com/help-center/ --post-type=kb_icon --name="Starter Templates by Kadence WP"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: starter-templates-by-kadence-wp
          SCRAPE_NAME: "Starter Templates By Kadence Wp"
        run: bash scripts/gh-push-scrape.sh
