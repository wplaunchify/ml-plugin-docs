name: Scrape Affiliatewp Direct Link Tracking Documentation

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Affiliatewp Direct Link Tracking scraper
        run: node scraper.js --slug=affiliatewp-direct-link-tracking --mode=wp-api --url=https://affiliatewp.com/docs/ --post-type=documentation --name="AffiliateWP - Direct Link Tracking"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: affiliatewp-direct-link-tracking
          SCRAPE_NAME: "Affiliatewp Direct Link Tracking"
        run: bash scripts/gh-push-scrape.sh
