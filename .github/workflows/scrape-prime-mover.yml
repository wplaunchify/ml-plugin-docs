name: Scrape Prime Mover Documentation

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Prime Mover scraper
        run: node scraper.js --slug=prime-mover --mode=html-scrape --url=https://codexonics.com/prime-mover/prime-mover-documentation/ --name="Prime Mover"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: prime-mover
          SCRAPE_NAME: "Prime Mover"
        run: bash scripts/gh-push-scrape.sh
