name: Scrape Fluentaffiliate Pro Documentation

on:
  schedule:
    - cron: '0 19 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Fluentaffiliate Pro scraper
        run: node scraper.js --slug=fluentaffiliate-pro --mode=wp-api --url=https://fluentaffiliate.com/docs/ --post-type=kb_icon --name="FluentAffiliate Pro"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: fluentaffiliate-pro
          SCRAPE_NAME: "Fluentaffiliate Pro"
        run: bash scripts/gh-push-scrape.sh
