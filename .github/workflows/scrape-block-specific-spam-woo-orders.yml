name: Scrape Block Specific Spam Woo Orders Documentation

on:
  schedule:
    - cron: '0 18 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Block Specific Spam Woo Orders scraper
        run: node scraper.js --slug=block-specific-spam-woo-orders --mode=html-scrape --url=https://wordpress.org/plugins/block-specific-spam-woo-orders/ --name="Block Specific Spam Woo Orders"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: block-specific-spam-woo-orders
          SCRAPE_NAME: "Block Specific Spam Woo Orders"
        run: bash scripts/gh-push-scrape.sh
