name: Scrape Custom Post Type Ui Documentation

on:
  schedule:
    - cron: '0 23 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Custom Post Type Ui scraper
        run: node scraper.js --slug=custom-post-type-ui --mode=wp-api --url=https://docs.pluginize.com/collection/81-custom-post-type-ui --post-type=article --name="Custom Post Type UI"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: custom-post-type-ui
          SCRAPE_NAME: "Custom Post Type Ui"
        run: bash scripts/gh-push-scrape.sh
