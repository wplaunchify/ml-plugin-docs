name: Scrape Block Visibility Documentation

on:
  schedule:
    - cron: '0 1 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Block Visibility scraper
        run: node scraper.js --slug=block-visibility --mode=wp-api --url=https://www.blockvisibilitywp.com/knowledge-base/ --post-type=article --name="Block Visibility"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: block-visibility
          SCRAPE_NAME: "Block Visibility"
        run: bash scripts/gh-push-scrape.sh
