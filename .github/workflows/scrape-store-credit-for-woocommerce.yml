name: Scrape Store Credit For Woocommerce Documentation

on:
  schedule:
    - cron: '0 19 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Store Credit For Woocommerce scraper
        run: node scraper.js --slug=store-credit-for-woocommerce --mode=wp-api --url=https://woocommerce.com/document/woocommerce-store-credit/ --post-type=documentation --taxonomy=documentation_category --name="Store Credit for WooCommerce"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: store-credit-for-woocommerce
          SCRAPE_NAME: "Store Credit For Woocommerce"
        run: bash scripts/gh-push-scrape.sh
