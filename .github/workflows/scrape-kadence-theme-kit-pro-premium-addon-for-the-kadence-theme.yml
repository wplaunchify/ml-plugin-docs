name: Scrape Kadence Theme Kit Pro Premium Addon For The Kadence Theme Documentation

on:
  schedule:
    - cron: '0 16 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Kadence Theme Kit Pro Premium Addon For The Kadence Theme scraper
        run: node scraper.js --slug=kadence-theme-kit-pro-premium-addon-for-the-kadence-theme --mode=wp-api --url=https://www.kadencewp.com/help-center/ --post-type=kb_icon --name="Kadence Theme Kit Pro - Premium addon for the Kadence Theme"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: kadence-theme-kit-pro-premium-addon-for-the-kadence-theme
          SCRAPE_NAME: "Kadence Theme Kit Pro Premium Addon For The Kadence Theme"
        run: bash scripts/gh-push-scrape.sh
