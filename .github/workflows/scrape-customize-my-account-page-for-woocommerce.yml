name: Scrape Customize My Account Page For Woocommerce Documentation

on:
  schedule:
    - cron: '0 10 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Customize My Account Page For Woocommerce scraper
        run: node scraper.js --slug=customize-my-account-page-for-woocommerce --mode=wp-api --url=https://woocommerce.com/document/customize-my-account-for-woocommerce/ --post-type=documentation --taxonomy=documentation_category --name="Customize My Account Page For Woocommerce"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "ML Docs Bot"
          git config user.email "bot@wplaunchify.com"
          git add plugins/ INDEX.json
          PAGES=$(node -e "const d=require('./plugins/customize-my-account-page-for-woocommerce/documentation.json'); console.log(d.total_pages)")
          git commit -m "Update Customize My Account Page For Woocommerce docs (${PAGES} pages) - $(date -u +%Y-%m-%d)"
          git push
