name: Scrape Luckywp Table Of Contents Documentation

on:
  schedule:
    - cron: '0 10 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Luckywp Table Of Contents scraper
        run: node scraper.js --slug=luckywp-table-of-contents --mode=html-scrape --url=https://theluckywp.com/product/table-of-contents/ --name="LuckyWP Table of Contents"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: luckywp-table-of-contents
          SCRAPE_NAME: "Luckywp Table Of Contents"
        run: bash scripts/gh-push-scrape.sh
