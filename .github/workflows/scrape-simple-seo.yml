name: Scrape Simple Seo Documentation

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Simple Seo scraper
        run: node scraper.js --slug=simple-seo --mode=html-scrape --url=https://wordpress.org/plugins/simple-seo/ --name="Simple SEO"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: simple-seo
          SCRAPE_NAME: "Simple Seo"
        run: bash scripts/gh-push-scrape.sh
