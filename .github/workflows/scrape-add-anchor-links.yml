name: Scrape Add Anchor Links Documentation

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Add Anchor Links scraper
        run: node scraper.js --slug=add-anchor-links --mode=html-scrape --url=https://wordpress.org/plugins/add-anchor-links/ --name="Add Anchor Links"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: add-anchor-links
          SCRAPE_NAME: "Add Anchor Links"
        run: bash scripts/gh-push-scrape.sh
