name: Scrape The Events Calendar Documentation

on:
  schedule:
    - cron: '0 16 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run The Events Calendar scraper
        run: node scraper.js --slug=the-events-calendar --mode=wp-api --url=https://theeventscalendar.com/knowledgebase/ --post-type=kb_icon --name="The Events Calendar"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: the-events-calendar
          SCRAPE_NAME: "The Events Calendar"
        run: bash scripts/gh-push-scrape.sh
