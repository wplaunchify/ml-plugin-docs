name: Scrape Manage Notification E Mails Documentation

on:
  schedule:
    - cron: '0 17 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Manage Notification E Mails scraper
        run: node scraper.js --slug=manage-notification-e-mails --mode=html-scrape --url=https://wordpress.org/plugins/manage-notification-emails/ --name="Manage Notification E-mails"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: manage-notification-e-mails
          SCRAPE_NAME: "Manage Notification E Mails"
        run: bash scripts/gh-push-scrape.sh
