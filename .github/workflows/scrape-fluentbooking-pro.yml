name: Scrape Fluentbooking Pro Documentation

on:
  schedule:
    - cron: '0 1 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Fluentbooking Pro scraper
        run: node scraper.js --slug=fluentbooking-pro --mode=html-scrape --url=https://fluentbooking.co/docs/ --name="FluentBooking Pro"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: fluentbooking-pro
          SCRAPE_NAME: "Fluentbooking Pro"
        run: bash scripts/gh-push-scrape.sh
