name: Scrape Kadence Blocks Documentation

on:
  schedule:
    - cron: '0 11 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Kadence Blocks scraper
        run: |
          node scraper.js --slug=kadence-blocks --mode=sitemap \
            --url=https://www.kadencewp.com/help-center/docs/kadence-blocks/ \
            --sitemap-index=https://www.kadencewp.com/help-center/sitemap_index.xml \
            --selector=.betterdocs-single-content \
            --name="Kadence Blocks"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "ML Docs Bot"
          git config user.email "bot@wplaunchify.com"
          git add plugins/ INDEX.json
          PAGES=$(node -e "const d=require('./plugins/kadence-blocks/documentation.json'); console.log(d.total_pages)")
          git commit -m "Update Kadence Blocks docs (${PAGES} pages) - $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push || (sleep 8 && git pull --rebase origin main && git push)
