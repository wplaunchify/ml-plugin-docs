name: Scrape Product Filters For Woocommerce Documentation

on:
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Product Filters For Woocommerce scraper
        run: node scraper.js --slug=product-filters-for-woocommerce --mode=wp-api --url=https://woobewoo.com/documentation/getting-started-with-woocommerce-filter/ --post-type=documentation --name="Product Filters for WooCommerce"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: product-filters-for-woocommerce
          SCRAPE_NAME: "Product Filters For Woocommerce"
        run: bash scripts/gh-push-scrape.sh
