name: Scrape Fluent Support Documentation

on:
  schedule:
    - cron: '0 21 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Fluent Support scraper
        run: node scraper.js --slug=fluent-support --mode=html-scrape --url=https://fluentsupport.co/docs/ --name="Fluent Support"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "ML Docs Bot"
          git config user.email "bot@wplaunchify.com"
          git add plugins/ INDEX.json
          PAGES=$(node -e "const d=require('./plugins/fluent-support/documentation.json'); console.log(d.total_pages)")
          git commit -m "Update Fluent Support docs (${PAGES} pages) - $(date -u +%Y-%m-%d)"
          git push
