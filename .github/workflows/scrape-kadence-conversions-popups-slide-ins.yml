name: Scrape Kadence Conversions Popups Slide Ins Documentation

on:
  schedule:
    - cron: '0 20 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Kadence Conversions Popups Slide Ins scraper
        run: node scraper.js --slug=kadence-conversions-popups-slide-ins --mode=wp-api --url=https://www.kadencewp.com/help-center/ --post-type=kb_icon --name="Kadence Conversions - Popups, slide-ins"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: kadence-conversions-popups-slide-ins
          SCRAPE_NAME: "Kadence Conversions Popups Slide Ins"
        run: bash scripts/gh-push-scrape.sh
