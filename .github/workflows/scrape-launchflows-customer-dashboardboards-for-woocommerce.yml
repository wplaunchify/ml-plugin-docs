name: Scrape Launchflows Customer Dashboardboards For Woocommerce Documentation

on:
  schedule:
    - cron: '0 14 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Launchflows Customer Dashboardboards For Woocommerce scraper
        run: node scraper.js --slug=launchflows-customer-dashboardboards-for-woocommerce --mode=wp-api --url=https://launchflows.com --post-type=documentation --name="LaunchFlows Customer Dashboardboards For WooCommerce"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: launchflows-customer-dashboardboards-for-woocommerce
          SCRAPE_NAME: "Launchflows Customer Dashboardboards For Woocommerce"
        run: bash scripts/gh-push-scrape.sh
