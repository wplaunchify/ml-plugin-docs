name: Scrape WooCommerce Subscriptions Documentation

on:
  schedule:
    - cron: '0 12 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run WooCommerce Subscriptions scraper
        run: |
          node scraper.js --slug=woocommerce-subscriptions --mode=sitemap \
            --url=https://woocommerce.com/document/subscriptions/ \
            --sitemap-index=https://woocommerce.com/wp-sitemap.xml \
            --selector=.wccom-single-doc-content \
            --name="WooCommerce Subscriptions"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: woocommerce-subscriptions
          SCRAPE_NAME: "WooCommerce Subscriptions"
        run: bash scripts/gh-push-scrape.sh
