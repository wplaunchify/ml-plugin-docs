name: Scrape Independent Analytics Pro Documentation

on:
  schedule:
    - cron: '0 8 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Independent Analytics Pro scraper
        run: node scraper.js --slug=independent-analytics-pro --mode=wp-api --url=https://independentwp.com/knowledge-base/ --post-type=kb_article --taxonomy=kb_article_category --name="Independent Analytics Pro"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: independent-analytics-pro
          SCRAPE_NAME: "Independent Analytics Pro"
        run: bash scripts/gh-push-scrape.sh
