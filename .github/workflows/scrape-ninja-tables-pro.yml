name: Scrape Ninja Tables Pro Documentation

on:
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Ninja Tables Pro scraper
        run: node scraper.js --slug=ninja-tables-pro --mode=wp-api --url=https://wpmanageninja.com/docs/ninja-tables/ --post-type=docs --name="Ninja Tables Pro"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: ninja-tables-pro
          SCRAPE_NAME: "Ninja Tables Pro"
        run: bash scripts/gh-push-scrape.sh
