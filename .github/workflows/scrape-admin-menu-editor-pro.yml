name: Scrape Admin Menu Editor Pro Documentation

on:
  schedule:
    - cron: '0 17 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Admin Menu Editor Pro scraper
        run: node scraper.js --slug=admin-menu-editor-pro --mode=html-scrape --url=https://adminmenueditor.com --name="Admin Menu Editor Pro"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "ML Docs Bot"
          git config user.email "bot@wplaunchify.com"
          git add plugins/ INDEX.json
          PAGES=$(node -e "const d=require('./plugins/admin-menu-editor-pro/documentation.json'); console.log(d.total_pages)")
          git commit -m "Update Admin Menu Editor Pro docs (${PAGES} pages) - $(date -u +%Y-%m-%d)"
          git push
