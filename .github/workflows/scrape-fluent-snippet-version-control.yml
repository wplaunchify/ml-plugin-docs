name: Scrape Fluent Snippet Version Control Documentation

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Fluent Snippet Version Control scraper
        run: node scraper.js --slug=fluent-snippet-version-control --mode=html-scrape --url=https://fluent-snippet.com/docs/ --name="Fluent Snippet Version Control"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: fluent-snippet-version-control
          SCRAPE_NAME: "Fluent Snippet Version Control"
        run: bash scripts/gh-push-scrape.sh
