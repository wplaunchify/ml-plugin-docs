name: Scrape Autocomplete Woocommerce Orders Documentation

on:
  schedule:
    - cron: '0 16 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Autocomplete Woocommerce Orders scraper
        run: node scraper.js --slug=autocomplete-woocommerce-orders --mode=wp-api --url=https://quadlayers.com/documentation/woocommerce-autocomplete-orders/ --post-type=doc --name="Autocomplete WooCommerce Orders"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: autocomplete-woocommerce-orders
          SCRAPE_NAME: "Autocomplete Woocommerce Orders"
        run: bash scripts/gh-push-scrape.sh
