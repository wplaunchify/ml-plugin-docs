name: Scrape Wp Social Ninja Documentation

on:
  schedule:
    - cron: '0 1 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Wp Social Ninja scraper
        run: node scraper.js --slug=wp-social-ninja --mode=wp-api --url=https://wpsocialninja.com/docs/ --post-type=kb_icon --name="WP Social Ninja"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: wp-social-ninja
          SCRAPE_NAME: "Wp Social Ninja"
        run: bash scripts/gh-push-scrape.sh
