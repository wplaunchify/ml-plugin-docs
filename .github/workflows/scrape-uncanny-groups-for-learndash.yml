name: Scrape Uncanny Groups For Learndash Documentation

on:
  schedule:
    - cron: '0 13 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Uncanny Groups For Learndash scraper
        run: node scraper.js --slug=uncanny-groups-for-learndash --mode=wp-api --url=https://www.uncannyowl.com/knowledge-base/ --post-type=ht_kb --name="Uncanny Groups for LearnDash"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: uncanny-groups-for-learndash
          SCRAPE_NAME: "Uncanny Groups For Learndash"
        run: bash scripts/gh-push-scrape.sh
