name: Scrape Woocommerce Smart Coupons Documentation

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Woocommerce Smart Coupons scraper
        run: node scraper.js --slug=woocommerce-smart-coupons --mode=wp-api --url=https://woocommerce.com/document/ --post-type=documentation --taxonomy=documentation_category --name="WooCommerce Smart Coupons"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "ML Docs Bot"
          git config user.email "bot@wplaunchify.com"
          git add plugins/ INDEX.json
          PAGES=$(node -e "const d=require('./plugins/woocommerce-smart-coupons/documentation.json'); console.log(d.total_pages)")
          git commit -m "Update Woocommerce Smart Coupons docs (${PAGES} pages) - $(date -u +%Y-%m-%d)"
          git push
