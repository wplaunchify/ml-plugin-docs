name: Scrape Fooevents Express Check In Documentation

on:
  schedule:
    - cron: '0 12 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Fooevents Express Check In scraper
        run: node scraper.js --slug=fooevents-express-check-in --mode=html-scrape --url=https://www.fooevents.com --name="FooEvents Express Check-in"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: fooevents-express-check-in
          SCRAPE_NAME: "Fooevents Express Check In"
        run: bash scripts/gh-push-scrape.sh
