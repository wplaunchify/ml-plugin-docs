name: Scrape Kadence Theme Documentation

on:
  schedule:
    - cron: '0 10 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Kadence Theme scraper
        run: |
          node scraper.js --slug=kadence-theme --mode=sitemap \
            --url=https://www.kadencewp.com/help-center/docs/kadence-theme/ \
            --sitemap-index=https://www.kadencewp.com/help-center/sitemap_index.xml \
            --selector=.betterdocs-single-content \
            --name="Kadence Theme"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: kadence-theme
          SCRAPE_NAME: "Kadence Theme"
        run: bash scripts/gh-push-scrape.sh
