name: Scrape Wpc Product Bundles For Woocommerce Premium Documentation

on:
  schedule:
    - cron: '0 16 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Wpc Product Bundles For Woocommerce Premium scraper
        run: node scraper.js --slug=wpc-product-bundles-for-woocommerce-premium --mode=html-scrape --url=https://wpclever.net/docs/ --name="WPC Product Bundles for WooCommerce (Premium)"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: wpc-product-bundles-for-woocommerce-premium
          SCRAPE_NAME: "Wpc Product Bundles For Woocommerce Premium"
        run: bash scripts/gh-push-scrape.sh
