name: Scrape Wp Migrate Lite Documentation

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Wp Migrate Lite scraper
        run: node scraper.js --slug=wp-migrate-lite --mode=wp-api --url=https://deliciousbrains.com/wp-migrate-db-pro --post-type=dbi_faq --name="WP Migrate Lite"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: wp-migrate-lite
          SCRAPE_NAME: "Wp Migrate Lite"
        run: bash scripts/gh-push-scrape.sh
