name: Scrape Wp All Import Pro Documentation

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Wp All Import Pro scraper
        run: node scraper.js --slug=wp-all-import-pro --mode=wp-api --url=https://www.wpallimport.com --post-type=documentation --name="WP All Import Pro"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: wp-all-import-pro
          SCRAPE_NAME: "Wp All Import Pro"
        run: bash scripts/gh-push-scrape.sh
