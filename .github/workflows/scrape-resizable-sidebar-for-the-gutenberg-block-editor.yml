name: Scrape Resizable Sidebar For The Gutenberg Block Editor Documentation

on:
  schedule:
    - cron: '0 12 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Resizable Sidebar For The Gutenberg Block Editor scraper
        run: node scraper.js --slug=resizable-sidebar-for-the-gutenberg-block-editor --mode=html-scrape --url=https://wordpress.org/plugins/resizable-editor-sidebar/ --name="Resizable Sidebar for the Gutenberg Block Editor"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: resizable-sidebar-for-the-gutenberg-block-editor
          SCRAPE_NAME: "Resizable Sidebar For The Gutenberg Block Editor"
        run: bash scripts/gh-push-scrape.sh
