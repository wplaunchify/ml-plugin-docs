name: Scrape Fluentcrm Marketing Automation For Wordpress Documentation

on:
  schedule:
    - cron: '0 17 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Fluentcrm Marketing Automation For Wordpress scraper
        run: node scraper.js --slug=fluentcrm-marketing-automation-for-wordpress --mode=wp-api --url=https://fluentcrm.com/docs/ --post-type=docs --taxonomy=doc_category --name="FluentCRM - Marketing Automation For WordPress"

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet plugins/ INDEX.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push results
        if: steps.changes.outputs.changed == 'true'
        env:
          SCRAPE_SLUG: fluentcrm-marketing-automation-for-wordpress
          SCRAPE_NAME: "Fluentcrm Marketing Automation For Wordpress"
        run: bash scripts/gh-push-scrape.sh
